<html lang="id">
<head>

    <!-- Supabase SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            background: #000;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://i.imgur.com/zGbaikU.jpeg') no-repeat center center;
            background-size: cover;
            z-index: -2;
            filter: brightness(0.4);
        }

        .bg-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid #ffd700;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo img { height: 45px; width: auto; object-fit: contain; }

        .menu-container { position: relative; }
        .burger { cursor: pointer; padding: 5px; }
        .burger span {
            display: block; width: 25px; height: 3px;
            margin: 5px 0; background: #ffd700; border-radius: 2px;
        }

        .dropdown-card {
            display: none;
            position: absolute;
            top: 50px; right: 0;
            background: rgba(17, 17, 17, 0.95);
            border: 1px solid #ffd700;
            border-radius: 8px;
            width: 160px;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }
        .dropdown-card.active { display: flex; }
        .dropdown-card a {
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .dropdown-card a:last-child { border-bottom: none; }
        .dropdown-card a:hover { background: #ffd700; color: #000; }

        /* MARQUEE */
        .marquee-container {
            background: #b32e2e;
            height: 35px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #ffd700;
        }
        .marquee-content { width: 100%; }
        .marquee-content marquee {
            font-weight: 600; font-size: 14px; color: #fff; display: block;
        }

        /* BANNER SLIDER */
        .banner-slider {
            width: 100%;
            position: relative;
            overflow: hidden;
            aspect-ratio: 21 / 9;
            border-bottom: 2px solid #ffd700;
        }
        @media (max-width: 768px) {
            .banner-slider { aspect-ratio: 16 / 9; }
        }
        .slider-wrapper {
            display: flex;
            transition: transform 0.6s ease-in-out;
            height: 100%;
        }
        .slide { min-width: 100%; height: 100%; }
        .slide img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .prev-btn, .next-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: #ffd700;
            border: none; font-size: 24px; padding: 10px;
            cursor: pointer; z-index: 5;
        }
        .next-btn { right: 0; }
        .prev-btn { left: 0; }

        /* TAB FILTER */
        .tab-filter {
            display: flex; gap: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }
        .tab-filter::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid #ffd700;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            white-space: nowrap;
            transition: 0.3s;
        }
        .tab-btn.active { background: #ffd700; color: #000; }

        /* SCHEDULE TABLE */
        .schedule-section {
            padding: 25px 20px;
            max-width: 1100px;
            margin: auto;
        }
        .section-title {
            font-weight: 800;
            color: #ffd700;
            margin-bottom: 15px;
            border-left: 4px solid #ffd700;
            padding-left: 15px;
        }

        .table-container {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid rgba(255,215,0,0.3);
            margin-bottom: 30px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th {
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            padding: 15px;
            text-align: left;
            font-size: 13px;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }

        /* MATCH CARDS */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1100px;
            margin: auto;
        }
        .match-grid .card {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
            transition: 0.3s;
        }
        .match-grid .card:hover { border-color: #ffd700; transform: translateY(-5px); }

        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .team { flex: 1; }
        .team img {
            width: 60px; height: 60px;
            object-fit: contain;
            border: 2px solid #ffd700;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            padding: 5px;
            margin-bottom: 5px;
        }
        .team-logo-placeholder {
            width: 60px; height: 60px;
            border: 2px solid #ffd700;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 auto 5px;
        }
        .vs { font-size: 22px; font-weight: 800; color: #ffd700; padding: 0 10px; }
        .score { font-size: 35px; font-weight: 700; margin: 10px 0; color: #fff; }

        .copy-btn {
            background: transparent;
            color: #ffd700;
            border: 1px dashed #ffd700;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .copy-btn:hover { background: rgba(255,215,0,0.1); }

        .card-btn {
            display: block;
            background: #ffd700;
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 800;
            transition: 0.3s;
        }
        .card-btn:hover { background: #fff; }

        /* FLOATING BUTTON */
        .floating {
            position: fixed;
            bottom: 20px; right: 20px;
            background: #ffd700;
            color: #000;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(255,215,0,0.4);
        }

        /* DOTS */
        .dots-container {
            position: absolute;
            bottom: 10px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px;
        }
        .dot {
            width: 10px; height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }
        .dot.active { background: #ffd700; width: 25px; border-radius: 10px; }

        /* 3D CAROUSEL */
        .page { width: 100%; overflow: hidden; padding: 20px 0; }
        .scene {
            width: 160px; height: 230px;
            margin: 50px auto 70px auto;
            perspective: 1000px;
        }
        .a3d {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 25s linear infinite;
        }
        .a3d img.carousel-img {
            position: absolute;
            width: 100%; height: 100%;
            padding: 0 !important;
            background: none !important;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid #ffd700;
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
            transform: rotateY(calc(var(--i) * (360deg / var(--n)))) translateZ(280px);
        }
        @keyframes rotate {
            from { transform: rotateY(0deg); }
            to   { transform: rotateY(360deg); }
        }

        /* EMPTY / LOADING STATE */
        .state-msg {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
        }
        .loader-ring {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,215,0,0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<script>
// ═══════════════════════════════════════════════════════
// SUPABASE CLIENT — DIRECT CONNECTION (NO NETLIFY)
// ═══════════════════════════════════════════════════════
const { createClient } = supabase;
const db = createClient(
    'https://bejygkgfpeuhphrrelmy.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJlanlna2dmcGV1aHBocnJlbG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MzIwNTgsImV4cCI6MjA5NjIwODA1OH0.S8zDfyUu3tcmFeqZXkzj-nPkdW14zm-mLyYr3iBGvcM'
);

// ═══════════════════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════════════════
let allSchedules = [];
let sliderIdx    = 0;
let sliderSlides = [];

// ═══════════════════════════════════════════════════════
// BURGER MENU
// ═══════════════════════════════════════════════════════
const burger       = document.getElementById('burger');
const dropdownCard = document.getElementById('dropdownCard');
burger.addEventListener('click', e => {
    dropdownCard.classList.toggle('active');
    e.stopPropagation();
});
document.addEventListener('click', () => dropdownCard.classList.remove('active'));

// ═══════════════════════════════════════════════════════
// LOAD ALL DATA LANGSUNG DARI SUPABASE
// ═══════════════════════════════════════════════════════
async function loadAllWebsiteData() {
    try {
        // Query semua tabel secara paralel
        const [
            { data: marqueeData, error: errMarquee },
            { data: bannerData,  error: errBanner  },
            { data: jadwalData,  error: errJadwal  },
            { data: hasilData,   error: errHasil   }
        ] = await Promise.all([
            db.from('marquee').select('*').order('id', { ascending: true }),
            db.from('banner').select('*').order('id', { ascending: true }),
            db.from('jadwal').select('*').order('id', { ascending: true }),
            db.from('hasil').select('*').order('id', { ascending: true })
        ]);

        // Log error per-tabel tanpa menghentikan render tabel lainnya
        if (errMarquee) console.error('Supabase marquee error:', errMarquee.message);
        if (errBanner)  console.error('Supabase banner error:',  errBanner.message);
        if (errJadwal)  console.error('Supabase jadwal error:',  errJadwal.message);
        if (errHasil)   console.error('Supabase hasil error:',   errHasil.message);

        // 1. Marquee
        const marquee = marqueeData || [];
        document.getElementById('marqueeText').textContent = marquee.length > 0
            ? marquee.map(r => r.text).join('   ●   ')
            : '📢 RINJANI4D: Prediksi Terakurat Hari Ini!';

        // 2. Banner Slider
        renderBannerSlider(bannerData || []);

        // 3. Jadwal / Analisa
        allSchedules = jadwalData || [];
        buildLeagueTabs();
        renderTable(allSchedules);

        // 4. Kartu Prediksi Skor Akurat
        renderCards(hasilData || []);

    } catch (e) {
        // Fallback umum jika terjadi error tak terduga
        console.error('loadAllWebsiteData error:', e.message);
        document.getElementById('marqueeText').textContent = '📢 RINJANI4D: Prediksi Terakurat Hari Ini!';
        document.getElementById('scheduleBody').innerHTML =
            `<tr><td colspan="4" style="text-align:center;color:#fc8181;padding:20px;">Gagal memuat jadwal.</td></tr>`;
        document.getElementById('matches').innerHTML =
            `<div style="grid-column:1/-1;text-align:center;color:#fc8181;padding:30px;">Gagal memuat hasil prediksi.</div>`;
    }
}

// ═══════════════════════════════════════════════════════
// RENDER BANNER SLIDER
// ═══════════════════════════════════════════════════════
function renderBannerSlider(data) {
    if (!data || data.length === 0) return;

    const sw = document.getElementById('slider');
    const dc = document.getElementById('dotsContainer');
    sw.innerHTML = ''; dc.innerHTML = '';

    sliderSlides = data;
    sliderIdx = 1;

    data.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goToSlide(i + 1));
        dc.appendChild(dot);
    });

    const lastClone = document.createElement('div'); lastClone.className = 'slide';
    const imgLast = document.createElement('img'); imgLast.src = data[data.length - 1].image_url;
    lastClone.appendChild(imgLast); sw.appendChild(lastClone);

    data.forEach((banner) => {
        const slide = document.createElement('div'); slide.className = 'slide';
        const img = document.createElement('img'); img.src = banner.image_url; img.alt = banner.alt_text || 'Banner';
        slide.appendChild(img); sw.appendChild(slide);
    });

    const firstClone = document.createElement('div'); firstClone.className = 'slide';
    const imgFirst = document.createElement('img'); imgFirst.src = data[0].image_url;
    firstClone.appendChild(imgFirst); sw.appendChild(firstClone);

    sw.style.transition = 'none';
    sw.style.transform = `translateX(-${sliderIdx * 100}%)`;
}

let isTransitioning = false;
function moveSliderSmooth(targetIdx) {
    if (isTransitioning || !sliderSlides.length) return;
    isTransitioning = true;

    const sw = document.getElementById('slider');
    sliderIdx = targetIdx;
    sw.style.transition = 'transform 0.5s ease-in-out';
    sw.style.transform = `translateX(-${sliderIdx * 100}%)`;
    updateDots();
}

function goToSlide(targetIdx) { moveSliderSmooth(targetIdx); }

function updateDots() {
    let dotIdx = sliderIdx - 1;
    if (sliderIdx === 0) dotIdx = sliderSlides.length - 1;
    if (sliderIdx === sliderSlides.length + 1) dotIdx = 0;
    document.querySelectorAll('.dot').forEach((d, i) => {
        d.className = 'dot' + (i === dotIdx ? ' active' : '');
    });
}

document.getElementById('slider').addEventListener('transitionend', () => {
    const sw = document.getElementById('slider');
    isTransitioning = false;
    if (sliderIdx === sliderSlides.length + 1) {
        sw.style.transition = 'none';
        sliderIdx = 1;
        sw.style.transform = `translateX(-${sliderIdx * 100}%)`;
    }
    if (sliderIdx === 0) {
        sw.style.transition = 'none';
        sliderIdx = sliderSlides.length;
        sw.style.transform = `translateX(-${sliderIdx * 100}%)`;
    }
});

function initSliderControls() {
    document.getElementById('nextBtn').onclick = () => moveSliderSmooth(sliderIdx + 1);
    document.getElementById('prevBtn').onclick = () => moveSliderSmooth(sliderIdx - 1);
    setInterval(() => { moveSliderSmooth(sliderIdx + 1); }, 3500);
}

// ═══════════════════════════════════════════════════════
// JADWAL FILTER & TABLE
// ═══════════════════════════════════════════════════════
function buildLeagueTabs() {
    const leagues = ['ALL', ...new Set(allSchedules.map(s => s.league).filter(Boolean))];
    document.getElementById('tabFilter').innerHTML = leagues.map(l =>
        `<button class="tab-btn${l === 'ALL' ? ' active' : ''}" onclick="filterLeague('${l}')">${l === 'ALL' ? 'SEMUA' : l}</button>`
    ).join('');
}

function filterLeague(league) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active',
            (league === 'ALL' && btn.textContent.trim() === 'SEMUA') ||
            btn.textContent.trim() === league
        );
    });
    renderTable(league === 'ALL' ? allSchedules : allSchedules.filter(s => s.league === league));
}

function renderTable(data) {
    const body = document.getElementById('scheduleBody');
    if (!data.length) {
        body.innerHTML = `<tr><td colspan="4"><div class="state-msg">Tidak ada jadwal tersedia</div></td></tr>`;
        return;
    }
    body.innerHTML = data.map(s => {
        const parts   = (s.match_name || '').split(/ vs /i);
        const home    = parts[0]?.trim() || s.match_name || '—';
        const away    = parts[1]?.trim() || '';
        const homeLogo = s.home_logo
            ? `<img src="${s.home_logo}" style="width:22px;height:22px;object-fit:contain;border-radius:50%;vertical-align:middle;margin-right:4px;background:rgba(255,255,255,0.1);" onerror="this.style.display='none'">`
            : '';
        const awayLogo = s.away_logo
            ? `<img src="${s.away_logo}" style="width:22px;height:22px;object-fit:contain;border-radius:50%;vertical-align:middle;margin-left:4px;background:rgba(255,255,255,0.1);" onerror="this.style.display='none'">`
            : '';
        return `<tr>
            <td style="white-space:nowrap;font-weight:700;color:#ffd700;">${s.time || '—'} WIB</td>
            <td style="color:#ffd700;font-weight:bold;">${s.league || '—'}</td>
            <td>${homeLogo}${home}${away ? ` <span style="color:#ffd700;font-weight:800;margin:0 4px;">vs</span> ${away}${awayLogo}` : ''}</td>
            <td style="font-family:'Barlow Condensed';font-weight:800;color:#ffd700;">${s.prob || '—'}</td>
        </tr>`;
    }).join('');
}

// ═══════════════════════════════════════════════════════
// RENDER KARTU PREDIKSI
// ═══════════════════════════════════════════════════════
function renderCards(data) {
    const container = document.getElementById('matches');
    if (!data.length) {
        container.innerHTML = `<div style="grid-column:1/-1;"><div class="state-msg">Belum ada PREDIKSI SKOR AKURAT</div></div>`;
        return;
    }
    container.innerHTML = data.map(m => {
        const homeLogo = m.home_logo
            ? `<img src="${m.home_logo}" onerror="this.replaceWith(createPlaceholder())">`
            : `<div class="team-logo-placeholder">⚽</div>`;
        const awayLogo = m.away_logo
            ? `<img src="${m.away_logo}" onerror="this.replaceWith(createPlaceholder())">`
            : `<div class="team-logo-placeholder">⚽</div>`;
        const predText = `Prediksi ${m.home} vs ${m.away}: Skor ${m.score} — Analisa by RINJANI4D`;
        const waktuPertandingan = m.match_time || m.waktu || '';

        return `<div class="card">
            ${waktuPertandingan ? `
            <div class="match-time-display" style="color:#ffd700;font-size:12px;font-weight:700;margin-bottom:15px;letter-spacing:0.5px;opacity:0.9;">
                ${waktuPertandingan}
            </div>` : ''}
            <div class="teams">
                <div class="team">${homeLogo}<p>${m.home || '—'}</p></div>
                <div class="vs">VS</div>
                <div class="team">${awayLogo}<p>${m.away || '—'}</p></div>
            </div>
            <div class="score">${m.score || '—'}</div>
            <button class="copy-btn" onclick="copyMatch('${predText.replace(/'/g, "\\'")}')">📋 Salin Prediksi</button>
            <a href="https://rinjaniman.com" class="card-btn">PASANG SEKARANG</a>
        </div>`;
    }).join('');
}

function createPlaceholder() {
    const d = document.createElement('div');
    d.className = 'team-logo-placeholder';
    d.textContent = '⚽';
    return d;
}

function copyMatch(text) {
    navigator.clipboard.writeText(text)
        .then(() => { alert('✅ Prediksi berhasil disalin!'); })
        .catch(() => {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('✅ Prediksi berhasil disalin!');
        });
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init() {
    await loadAllWebsiteData();
    initSliderControls();

    // Polling setiap 60 detik (sama seperti sebelumnya)
    setInterval(loadAllWebsiteData, 60000);
}
document.addEventListener('DOMContentLoaded', init);
</script>
